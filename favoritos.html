<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./css/style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
    <title>Favoritos</title>
</head>

<body>
    <header>
        <img src="./assets/img/Pokemon_logo.svg.png" alt="Pokemon" class="poke-logo">
    </header>

    <input type="text" id="searchInput" placeholder="Search Pokemon">
    <button id="searchBtn">Search</button>
    <button id="favoritesBtn">Favorites</button>
    <button id="prevBtn">Previous</button>
    <button id="nextBtn">Next</button>
    <button id="resetBtn">Reset</button>
    <button id="backToPokedexBtn">Volver</button>
    <div id="favoritos"></div>
    <div id="spinner" class="spinner-border text-dark" role="status">
        <span class="visually-hidden">Loading...</span>
    </div>
    <script src="./js/script.js"></script>
</body>

</html>
